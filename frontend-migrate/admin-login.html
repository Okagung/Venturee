<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Venturee Admin - Login">
  <title>Admin Login - Venturee</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="auth-wrapper">
    <div class="auth-card">
      <h1 class="auth-logo">Venturee</h1>
      <p class="auth-subtitle">Admin Panel</p>

      <div id="message-container"></div>

      <div class="form-group">
        <label class="form-label" for="username">Username</label>
        <input type="text" class="form-input" id="username" placeholder="Masukkan username">
      </div>
      <div class="form-group">
        <label class="form-label" for="password">Password</label>
        <input type="password" class="form-input" id="password" placeholder="Masukkan password">
      </div>

      <button class="btn btn-primary btn-full btn-lg" onclick="handleAdminLogin()" id="btn-login" style="margin-top:8px;">
        Login Admin
      </button>
    </div>
  </div>

  <script src="js/api.js"></script>
  <script src="js/admin-login.js"></script>
</body>
</html>
